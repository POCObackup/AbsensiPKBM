<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e3f2fd">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #f5f7fa);
      text-align: center;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 28px;
      margin: 20px 0;
    }

    .nama {
      width: 100%;
      background: #dcdcdc;
      padding: 20px;
      margin: 10px 0;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
    }

    .masuk { background: #a5d6a7 !important; }
    .pulang { background: #90caf9 !important; }

    #popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-box {
      width: 90%;
      max-width: 320px;
      background: #fff;
      padding: 25px;
      border-radius: 16px;
    }

    .jam {
      font-size: 28px;
      font-weight: bold;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .btn-masuk { background: #4CAF50; color: white; }
    .btn-pulang { background: #2196F3; color: white; }
    .btn-batal { background: #ddd; }
  </style>
</head>

<body>

<div class="container">
  <h1>ABSENSI KARYAWAN</h1>
  <div id="listNama">Loading...</div>
</div>

<div id="popup">
  <div class="popup-box">
    <h3 id="namaPopup"></h3>
    <p id="tanggalPopup"></p>
    <div class="jam" id="jamPopup"></div>

    <button class="btn btn-masuk" onclick="pilihAbsen('Masuk')">Masuk</button>
    <button class="btn btn-pulang" onclick="pilihAbsen('Pulang')">Pulang</button>
    <button class="btn btn-batal" onclick="tutupPopup()">Batal</button>
  </div>
</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycby846bgrKt1ycGxcs2zwFcp8k7vx5H1QgL0-BcWlrsb4_FiZFYuu2QALvyAztD9qp5MJA/exec";

function loadKaryawan() {
  fetch(URL_API)
    .then(res => res.json())
    .then(data => {
      let container = document.getElementById("listNama");
      container.innerHTML = "";

      data.forEach(nama => {
        let div = document.createElement("div");
        div.className = "nama";
        div.innerText = nama;

        div.onclick = () => bukaPopup(nama, div);

        container.appendChild(div);
      });
    })
    .catch(err => {
      document.getElementById("listNama").innerText = "Gagal load data";
      console.error(err);
    });
}

window.onload = loadKaryawan;

let namaDipilih = "";
let divDipilih = null;

function bukaPopup(nama, div) {
  namaDipilih = nama;
  divDipilih = div;

  document.getElementById("namaPopup").innerText = nama;
  updateJam();

  window.jamInterval = setInterval(updateJam, 1000);
  document.getElementById("popup").style.display = "flex";
}

function updateJam() {
  let now = new Date();

  document.getElementById("tanggalPopup").innerText =
    now.toLocaleDateString("id-ID", { day: "numeric", month: "long", year: "numeric" });

  document.getElementById("jamPopup").innerText =
    now.toLocaleTimeString();
}

function pilihAbsen(tipe) {

  fetch(URL_API, {
    method: "POST",
    mode: "no-cors", // 🔥 WAJIB
    headers: {
      "Content-Type": "text/plain;charset=utf-8" // 🔥 WAJIB
    },
    body: JSON.stringify({
      nama: namaDipilih,
      tipe: tipe
    })
  });

  alert("Absensi terkirim"); // langsung kasih respon

  if (divDipilih) {
    if (tipe === "Masuk") divDipilih.classList.add("masuk");
    if (tipe === "Pulang") {
      divDipilih.classList.remove("masuk");
      divDipilih.classList.add("pulang");
    }
  }

  tutupPopup();
}

function tutupPopup() {
  document.getElementById("popup").style.display = "none";
  clearInterval(window.jamInterval);
}
</script>

</body>
</html>
